naftiko: 1.0.0-alpha2
info:
  label: Figma Analytics API — Library Analytics
  description: 'Figma Analytics API — Library Analytics. 1 operations. Lead operation: Figma Get Library Analytics Usage Data.
    Self-contained Naftiko capability covering one Figma business surface.'
  tags:
  - Figma
  - Library Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIGMA_API_KEY: FIGMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-library-analytics
    baseUri: https://api.figma.com
    description: Figma Analytics API — Library Analytics business capability. Self-contained, no shared references.
    resources:
    - name: v1-analytics-libraries-file_key-usages
      path: /v1/analytics/libraries/{file_key}/usages
      operations:
      - name: getlibraryanalyticsusages
        method: GET
        description: Figma Get Library Analytics Usage Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIGMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-library-analytics-rest
    port: 8080
    description: REST adapter for Figma Analytics API — Library Analytics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/analytics/libraries/{file-key}/usages
      name: v1-analytics-libraries-file-key-usages
      description: REST surface for v1-analytics-libraries-file_key-usages.
      operations:
      - method: GET
        name: getlibraryanalyticsusages
        description: Figma Get Library Analytics Usage Data
        call: analytics-library-analytics.getlibraryanalyticsusages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-library-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Figma Analytics API — Library Analytics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: figma-get-library-analytics-usage
      description: Figma Get Library Analytics Usage Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: analytics-library-analytics.getlibraryanalyticsusages
      outputParameters:
      - type: object
        mapping: $.
