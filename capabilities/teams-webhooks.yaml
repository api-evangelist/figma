naftiko: 1.0.0-alpha2
info:
  label: Figma Teams API — Webhooks
  description: 'Figma Teams API — Webhooks. 1 operations. Lead operation: Figma Get Team Webhooks. Self-contained Naftiko
    capability covering one Figma business surface.'
  tags:
  - Figma
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIGMA_API_KEY: FIGMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: teams-webhooks
    baseUri: https://api.figma.com
    description: Figma Teams API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: v2-teams-team_id-webhooks
      path: /v2/teams/{team_id}/webhooks
      operations:
      - name: getteamwebhooks
        method: GET
        description: Figma Get Team Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIGMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: teams-webhooks-rest
    port: 8080
    description: REST adapter for Figma Teams API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/teams/{team-id}/webhooks
      name: v2-teams-team-id-webhooks
      description: REST surface for v2-teams-team_id-webhooks.
      operations:
      - method: GET
        name: getteamwebhooks
        description: Figma Get Team Webhooks
        call: teams-webhooks.getteamwebhooks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teams-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Figma Teams API — Webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: figma-get-team-webhooks
      description: Figma Get Team Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teams-webhooks.getteamwebhooks
      outputParameters:
      - type: object
        mapping: $.
