naftiko: 1.0.0-alpha2
info:
  label: Figma Activity Logs API — Activity Logs
  description: 'Figma Activity Logs API — Activity Logs. 1 operations. Lead operation: Figma Get Activity Logs. Self-contained
    Naftiko capability covering one Figma business surface.'
  tags:
  - Figma
  - Activity Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIGMA_API_KEY: FIGMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: activity-logs-activity-logs
    baseUri: https://api.figma.com
    description: Figma Activity Logs API — Activity Logs business capability. Self-contained, no shared references.
    resources:
    - name: v1-activity_logs
      path: /v1/activity_logs
      operations:
      - name: getactivitylogs
        method: GET
        description: Figma Get Activity Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIGMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: activity-logs-activity-logs-rest
    port: 8080
    description: REST adapter for Figma Activity Logs API — Activity Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/activity-logs
      name: v1-activity-logs
      description: REST surface for v1-activity_logs.
      operations:
      - method: GET
        name: getactivitylogs
        description: Figma Get Activity Logs
        call: activity-logs-activity-logs.getactivitylogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: activity-logs-activity-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Figma Activity Logs API — Activity Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: figma-get-activity-logs
      description: Figma Get Activity Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: activity-logs-activity-logs.getactivitylogs
      outputParameters:
      - type: object
        mapping: $.
