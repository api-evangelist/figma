naftiko: 1.0.0-alpha2
info:
  label: Figma Images API — Files
  description: 'Figma Images API — Files. 1 operations. Lead operation: Figma Render Images of File Nodes. Self-contained
    Naftiko capability covering one Figma business surface.'
  tags:
  - Figma
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIGMA_API_KEY: FIGMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: images-files
    baseUri: https://api.figma.com
    description: Figma Images API — Files business capability. Self-contained, no shared references.
    resources:
    - name: v1-images-file_key
      path: /v1/images/{file_key}
      operations:
      - name: getimages
        method: GET
        description: Figma Render Images of File Nodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIGMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: images-files-rest
    port: 8080
    description: REST adapter for Figma Images API — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/images/{file-key}
      name: v1-images-file-key
      description: REST surface for v1-images-file_key.
      operations:
      - method: GET
        name: getimages
        description: Figma Render Images of File Nodes
        call: images-files.getimages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: images-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Figma Images API — Files. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: figma-render-images-file-nodes
      description: Figma Render Images of File Nodes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: images-files.getimages
      outputParameters:
      - type: object
        mapping: $.
