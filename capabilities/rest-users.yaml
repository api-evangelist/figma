naftiko: 1.0.0-alpha2
info:
  label: Figma REST API — Users
  description: 'Figma REST API — Users. 1 operations. Lead operation: Figma Get Current User. Self-contained Naftiko capability
    covering one Figma business surface.'
  tags:
  - Figma
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIGMA_API_KEY: FIGMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-users
    baseUri: https://api.figma.com
    description: Figma REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: v1-me
      path: /v1/me
      operations:
      - name: getme
        method: GET
        description: Figma Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIGMA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-users-rest
    port: 8080
    description: REST adapter for Figma REST API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/me
      name: v1-me
      description: REST surface for v1-me.
      operations:
      - method: GET
        name: getme
        description: Figma Get Current User
        call: rest-users.getme
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Figma REST API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: figma-get-current-user
      description: Figma Get Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-users.getme
      outputParameters:
      - type: object
        mapping: $.
