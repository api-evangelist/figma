# ─────────────────────────────────────────────
# Query
# ─────────────────────────────────────────────

type Query {
  # User
  me: User!

  # Files
  file(key: String!, version: String, depth: Int, geometry: String, plugin_data: String, branch_data: Boolean): FigmaFile!
  fileNodes(key: String!, ids: [String!]!, version: String, depth: Int, geometry: String, plugin_data: String): JSON!
  fileImages(key: String!, ids: [String!]!, scale: Float, format: ExportFormat, svg_include_id: Boolean, svg_simplify_stroke: Boolean, use_absolute_bounds: Boolean, version: String): JSON!
  fileImageFills(key: String!): JSON!
  fileVersions(key: String!, page_size: Int, before: Int, after: Int): [Version!]!

  # Comments
  comments(fileKey: String!, as_md: Boolean): [Comment!]!

  # Team resources
  teamComponents(team_id: String!, page_size: Int, before: Int, after: Int): TeamComponentsResult!
  teamComponentSets(team_id: String!, page_size: Int, before: Int, after: Int): TeamComponentSetsResult!
  teamStyles(team_id: String!, page_size: Int, before: Int, after: Int): TeamStylesResult!
  teamProjects(team_id: String!): [Project!]!
  teamWebhooks(team_id: String!): [WebhookV2!]!

  # File-level components and styles
  fileComponents(key: String!, page_size: Int, before: Int, after: Int): FileComponentsResult!
  fileComponentSets(key: String!, page_size: Int, before: Int, after: Int): FileComponentSetsResult!
  fileStyles(key: String!, page_size: Int, before: Int, after: Int): FileStylesResult!

  # Single resource lookups
  component(key: String!): Component!
  componentSet(key: String!): ComponentSet!
  style(key: String!): Style!
  webhook(id: String!): WebhookV2!

  # Projects
  projectFiles(project_id: String!, branch_data: Boolean): [ProjectFile!]!

  # Variables (Enterprise)
  localVariables(fileKey: String!): LocalVariablesResult!
  publishedVariables(fileKey: String!): PublishedVariablesResult!

  # Activity logs (Org)
  activityLogs(org_id: String!, event_type: String, start_time: DateTime, end_time: DateTime, limit: Int, cursor: String): ActivityLogsResult!

  # Dev resources
  devResources(fileKey: String!, nodeIds: [String!]): [DevResource!]!

  # Payments
  payments(user_id: String!, community_file_id: String, plugin_id: String, widget_id: String): [PaymentInformation!]!

  # Library analytics
  libraryAnalyticsComponentActions(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsActionsResult!
  libraryAnalyticsComponentUsages(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsUsagesResult!
  libraryAnalyticsStyleActions(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsActionsResult!
  libraryAnalyticsStyleUsages(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsStyleUsagesResult!
  libraryAnalyticsVariableActions(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsActionsResult!
  libraryAnalyticsVariableUsages(file_key: String!, group_by: String, order: String, cursor: String): LibraryAnalyticsVariableUsagesResult!
}

