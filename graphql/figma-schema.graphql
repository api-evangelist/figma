# Figma Conceptual GraphQL Schema
# Derived from the Figma REST API (https://developers.figma.com/docs/rest-api/)
# No native GraphQL endpoint exists; this schema models the REST API type system.

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Enumerations
# ─────────────────────────────────────────────

enum StyleType {
  FILL
  TEXT
  EFFECT
  GRID
}

enum NodeType {
  DOCUMENT
  CANVAS
  FRAME
  GROUP
  VECTOR
  BOOLEAN_OPERATION
  STAR
  LINE
  ELLIPSE
  REGULAR_POLYGON
  RECTANGLE
  TABLE
  TABLE_CELL
  TEXT
  SLICE
  COMPONENT
  COMPONENT_SET
  INSTANCE
  STICKY
  SHAPE_WITH_TEXT
  CONNECTOR
  WASHI_TAPE
}

enum BooleanOperation {
  UNION
  INTERSECT
  SUBTRACT
  EXCLUDE
}

enum BlendMode {
  PASS_THROUGH
  NORMAL
  DARKEN
  MULTIPLY
  LINEAR_BURN
  COLOR_BURN
  LIGHTEN
  SCREEN
  LINEAR_DODGE
  COLOR_DODGE
  OVERLAY
  SOFT_LIGHT
  HARD_LIGHT
  DIFFERENCE
  EXCLUSION
  HUE
  SATURATION
  COLOR
  LUMINOSITY
}

enum LayoutConstraintHorizontal {
  LEFT
  RIGHT
  CENTER
  LEFT_RIGHT
  SCALE
}

enum LayoutConstraintVertical {
  TOP
  BOTTOM
  CENTER
  TOP_BOTTOM
  SCALE
}

enum LayoutGridAlignment {
  MIN
  MAX
  CENTER
  STRETCH
}

enum LayoutGridPattern {
  COLUMNS
  ROWS
  GRID
}

enum ExportFormat {
  JPG
  PNG
  SVG
  PDF
}

enum ImageScaleMode {
  FILL
  FIT
  TILE
  CROP
}

enum TextAlignHorizontal {
  LEFT
  RIGHT
  CENTER
  JUSTIFIED
}

enum TextAlignVertical {
  TOP
  CENTER
  BOTTOM
}

enum TextDecoration {
  NONE
  UNDERLINE
  STRIKETHROUGH
}

enum TextCase {
  ORIGINAL
  UPPER
  LOWER
  TITLE
  SMALL_CAPS
  SMALL_CAPS_FORCED
}

enum StrokeAlign {
  INSIDE
  OUTSIDE
  CENTER
}

enum StrokeCap {
  NONE
  ROUND
  SQUARE
  LINE_ARROW
  TRIANGLE_ARROW
  DIAMOND_FILLED
  CIRCLE_FILLED
  TRIANGLE_FILLED
  WASHI_TAPE_1
  WASHI_TAPE_2
  WASHI_TAPE_3
  WASHI_TAPE_4
  WASHI_TAPE_5
  WASHI_TAPE_6
}

enum StrokeJoin {
  MITER
  BEVEL
  ROUND
}

enum EffectType {
  INNER_SHADOW
  DROP_SHADOW
  LAYER_BLUR
  BACKGROUND_BLUR
}

enum PaintType {
  SOLID
  GRADIENT_LINEAR
  GRADIENT_RADIAL
  GRADIENT_ANGULAR
  GRADIENT_DIAMOND
  IMAGE
  EMOJI
  VIDEO
}

enum VariableResolvedType {
  BOOLEAN
  FLOAT
  STRING
  COLOR
}

enum VariableScope {
  ALL_SCOPES
  TEXT_CONTENT
  CORNER_RADIUS
  WIDTH_HEIGHT
  GAP
  ALL_FILLS
  FRAME_FILL
  SHAPE_FILL
  TEXT_FILL
  STROKE_COLOR
  STROKE_FLOAT
  EFFECT_COLOR
  EFFECT_FLOAT
  OPACITY
  FONT_FAMILY
  FONT_STYLE
  FONT_WEIGHT
  FONT_SIZE
  LINE_HEIGHT
  LETTER_SPACING
  PARAGRAPH_SPACING
  PARAGRAPH_INDENT
}

enum WebhookStatus {
  ACTIVE
  PAUSED
}

enum WebhookEventType {
  FILE_UPDATE
  FILE_VERSION_UPDATE
  FILE_DELETE
  LIBRARY_PUBLISH
  FILE_COMMENT
}

enum PaymentStatus {
  UNPAID
  PAID
}

# ─────────────────────────────────────────────
# Shared value types
# ─────────────────────────────────────────────

type Color {
  r: Float!
  g: Float!
  b: Float!
  a: Float!
}

type ColorStop {
  position: Float!
  color: Color!
}

type Vector2D {
  x: Float!
  y: Float!
}

type Rectangle {
  x: Float
  y: Float
  width: Float
  height: Float
}

type Constraint {
  type: LayoutConstraintHorizontal!
  value: Float
}

type LayoutConstraint {
  vertical: LayoutConstraintVertical!
  horizontal: LayoutConstraintHorizontal!
}

type LayoutGrid {
  pattern: LayoutGridPattern!
  sectionSize: Float
  visible: Boolean
  color: Color
  alignment: LayoutGridAlignment
  gutterSize: Float
  offset: Float
  count: Int
}

type ExportSetting {
  suffix: String!
  format: ExportFormat!
  constraint: ExportConstraint!
}

type ExportConstraint {
  type: String!
  value: Float!
}

# ─────────────────────────────────────────────
# Paint / Fill
# ─────────────────────────────────────────────

type Paint {
  type: PaintType!
  visible: Boolean
  opacity: Float
  color: Color
  blendMode: BlendMode
  gradientHandlePositions: [Vector2D!]
  gradientStops: [ColorStop!]
  scaleMode: ImageScaleMode
  imageTransform: [[Float!]!]
  scalingFactor: Float
  rotation: Float
  imageRef: String
  gifRef: String
}

# ─────────────────────────────────────────────
# Effects
# ─────────────────────────────────────────────

type EffectShadow {
  type: EffectType!
  visible: Boolean!
  radius: Float!
  color: Color!
  blendMode: BlendMode!
  offset: Vector2D!
  spread: Float
  showShadowBehindNode: Boolean
}

type EffectBlur {
  type: EffectType!
  visible: Boolean!
  radius: Float!
}

union Effect = EffectShadow | EffectBlur

# ─────────────────────────────────────────────
# Typography
# ─────────────────────────────────────────────

type TypeStyle {
  fontFamily: String!
  fontPostScriptName: String
  paragraphSpacing: Float
  paragraphIndent: Float
  listSpacing: Float
  italic: Boolean
  fontWeight: Float!
  fontSize: Float!
  textCase: TextCase
  textDecoration: TextDecoration
  textAutoResize: String
  textTruncation: String
  maxLines: Int
  textAlignHorizontal: TextAlignHorizontal!
  textAlignVertical: TextAlignVertical!
  letterSpacing: Float!
  fills: [Paint!]
  hyperlink: Hyperlink
  opentypeFlags: JSON
  lineHeightPx: Float!
  lineHeightPercent: Float
  lineHeightPercentFontSize: Float
  lineHeightUnit: String!
}

type Hyperlink {
  type: String!
  url: String
  nodeID: String
}

