# ─────────────────────────────────────────────
# Mutation
# ─────────────────────────────────────────────

type Mutation {
  # Comments
  postComment(fileKey: String!, message: String!, client_meta: JSON, comment_id: String): Comment!
  deleteComment(fileKey: String!, commentId: String!): Boolean!
  postCommentReaction(fileKey: String!, commentId: String!, emoji: String!): Boolean!
  deleteCommentReaction(fileKey: String!, commentId: String!, emoji: String!): Boolean!

  # Versions
  createFileVersion(fileKey: String!, label: String, description: String): Version!
  deleteFileVersion(fileKey: String!, versionId: String!): Boolean!

  # Webhooks
  createWebhook(team_id: String!, event_type: WebhookEventType!, endpoint: String!, passcode: String!, status: WebhookStatus, description: String): WebhookV2!
  updateWebhook(id: String!, status: WebhookStatus, endpoint: String, passcode: String, description: String): WebhookV2!
  deleteWebhook(id: String!): Boolean!

  # Dev resources
  createDevResources(fileKey: String!, devResources: [DevResourceInput!]!): DevResourcesResult!
  updateDevResources(fileKey: String!, devResources: [DevResourceUpdateInput!]!): DevResourcesResult!
  deleteDevResource(fileKey: String!, devResourceId: String!): Boolean!

  # Variables (Enterprise)
  createVariable(fileKey: String!, variableCollectionId: String!, name: String!, resolvedType: VariableResolvedType!, description: String, hiddenFromPublishing: Boolean, scopes: [VariableScope!], codeSyntax: JSON): Variable!
  updateVariable(fileKey: String!, variableId: String!, name: String, description: String, hiddenFromPublishing: Boolean, scopes: [VariableScope!], codeSyntax: JSON): Variable!
  deleteVariable(fileKey: String!, variableId: String!): Boolean!
  createVariableCollection(fileKey: String!, name: String!, hiddenFromPublishing: Boolean): VariableCollection!
  updateVariableCollection(fileKey: String!, collectionId: String!, name: String, hiddenFromPublishing: Boolean): VariableCollection!
  deleteVariableCollection(fileKey: String!, collectionId: String!): Boolean!
  createVariableMode(fileKey: String!, collectionId: String!, name: String!): VariableMode!
  updateVariableMode(fileKey: String!, collectionId: String!, modeId: String!, name: String!): VariableMode!
  deleteVariableMode(fileKey: String!, collectionId: String!, modeId: String!): Boolean!
  setVariableModeValue(fileKey: String!, variableId: String!, modeId: String!, value: JSON!): Boolean!
  deleteVariableModeValue(fileKey: String!, variableId: String!, modeId: String!): Boolean!
}

# ─────────────────────────────────────────────
# Mutation input types
# ─────────────────────────────────────────────

input DevResourceInput {
  name: String!
  url: String!
  nodeId: String!
  fileKey: String!
}

input DevResourceUpdateInput {
  id: String!
  name: String
  url: String
}

type DevResourcesResult {
  devResources: [DevResource!]
  errors: [DevResourceError!]
}

type DevResourceError {
  resource: JSON
  error: String
}
