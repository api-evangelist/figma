specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Figma
providerId: figma
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Design
description: Figma REST API rate limits per token.
sources:
  - https://www.figma.com/pricing/
  - https://www.figma.com/developers/api
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: REST API (default)
    scope: token
    metric: requests_per_minute
    limit: 6000
    timeFrame: minute
    notes: Default rate; cost-based across endpoints.
  - name: Files endpoint
    scope: token
    metric: cost_per_minute
    limit: 50
    timeFrame: minute
  - name: Images endpoint
    scope: token
    metric: cost_per_minute
    limit: 200
    timeFrame: minute
